steps:
  # ─── Backend: Build & Push ───────────────────────────────────────────────────
  - name: "gcr.io/cloud-builders/docker"
    id: "build-backend"
    args:
      - build
      - -t
      - "gcr.io/$PROJECT_ID/siteguard-backend:$COMMIT_SHA"
      - -t
      - "gcr.io/$PROJECT_ID/siteguard-backend:latest"
      - ./backend

  - name: "gcr.io/cloud-builders/docker"
    id: "push-backend"
    waitFor: ["build-backend"]
    args:
      - push
      - "gcr.io/$PROJECT_ID/siteguard-backend:$COMMIT_SHA"

  # ─── Backend: Deploy to Cloud Run ────────────────────────────────────────────
  - name: "gcr.io/google.com/cloudsdktool/cloud-sdk"
    id: "deploy-backend"
    waitFor: ["push-backend"]
    entrypoint: gcloud
    args:
      - run
      - deploy
      - siteguard-backend
      - --image=gcr.io/$PROJECT_ID/siteguard-backend:$COMMIT_SHA
      - --region=us-central1
      - --platform=managed
      - --allow-unauthenticated
      - --port=8080
      - --memory=1Gi
      - --cpu=1
      - --min-instances=0
      - --max-instances=10
      - --set-env-vars=ENVIRONMENT=production,GCP_PROJECT_ID=$PROJECT_ID
      - --set-secrets=GEMINI_API_KEY=GEMINI_API_KEY:latest,GCS_BUCKET_EVIDENCE=GCS_BUCKET_EVIDENCE:latest,GCS_BUCKET_REPORTS=GCS_BUCKET_REPORTS:latest,GCS_BUCKET_RECORDINGS=GCS_BUCKET_RECORDINGS:latest
      - --service-account=siteguard-backend@$PROJECT_ID.iam.gserviceaccount.com

  # ─── Frontend: Build & Push ──────────────────────────────────────────────────
  - name: "gcr.io/google.com/cloudsdktool/cloud-sdk"
    id: "get-backend-url"
    waitFor: ["deploy-backend"]
    entrypoint: bash
    args:
      - "-c"
      - |
        BACKEND_URL=$(gcloud run services describe siteguard-backend \
          --region=us-central1 --format='value(status.url)')
        echo "BACKEND_URL=$$BACKEND_URL" > /workspace/backend_url.env
        echo "Backend URL: $$BACKEND_URL"

  - name: "gcr.io/cloud-builders/docker"
    id: "build-frontend"
    waitFor: ["get-backend-url"]
    entrypoint: bash
    args:
      - "-c"
      - |
        source /workspace/backend_url.env
        WS_URL=$$(echo $$BACKEND_URL | sed 's/https/wss/')
        docker build \
          --build-arg VITE_BACKEND_API_URL=$$BACKEND_URL \
          --build-arg VITE_BACKEND_WS_URL=$$WS_URL \
          -t gcr.io/$PROJECT_ID/siteguard-frontend:$COMMIT_SHA \
          -t gcr.io/$PROJECT_ID/siteguard-frontend:latest \
          ./frontend

  - name: "gcr.io/cloud-builders/docker"
    id: "push-frontend"
    waitFor: ["build-frontend"]
    args:
      - push
      - "gcr.io/$PROJECT_ID/siteguard-frontend:$COMMIT_SHA"

  - name: "gcr.io/google.com/cloudsdktool/cloud-sdk"
    id: "deploy-frontend"
    waitFor: ["push-frontend"]
    entrypoint: bash
    args:
      - "-c"
      - |
        source /workspace/backend_url.env
        WS_URL=$$(echo $$BACKEND_URL | sed 's/https/wss/')
        gcloud run deploy siteguard-frontend \
          --image=gcr.io/$PROJECT_ID/siteguard-frontend:$COMMIT_SHA \
          --region=us-central1 \
          --platform=managed \
          --allow-unauthenticated \
          --port=3000 \
          --memory=512Mi \
          --cpu=1 \
          --min-instances=0 \
          --max-instances=5 \
          --set-env-vars=VITE_BACKEND_API_URL=$$BACKEND_URL,VITE_BACKEND_WS_URL=$$WS_URL

images:
  - "gcr.io/$PROJECT_ID/siteguard-backend:$COMMIT_SHA"
  - "gcr.io/$PROJECT_ID/siteguard-frontend:$COMMIT_SHA"

timeout: "1200s"
options:
  logging: CLOUD_LOGGING_ONLY
