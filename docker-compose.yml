version: "3.9"

services:
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    ports:
      - "8080:8080"
    environment:
      - PORT=8080
      - ENVIRONMENT=development
    env_file:
      - ./backend/.env       # Create from backend/.env.example
    volumes:
      # Mount service account for local GCP auth (never commit this file)
      - ./backend/service-account.json:/app/service-account.json:ro
    environment:
      - GOOGLE_APPLICATION_CREDENTIALS=/app/service-account.json
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/health"]
      interval: 30s
      timeout: 10s
      retries: 3

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        - VITE_BACKEND_API_URL=http://localhost:8080
        - VITE_BACKEND_WS_URL=ws://localhost:8080
    ports:
      - "3000:3000"
    depends_on:
      backend:
        condition: service_healthy
    restart: unless-stopped

networks:
  default:
    name: siteguard-network
